<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umut Tur</title>
  <meta name="description" content="Umut Tur — Software student building C++ and Java projects." />
  <style>
    :root {
      --bg: #000000;
      --card: #0b0b0b;
      --text: #f5f5f5;
      --muted: #b0b0b0;
      --red: #e10600;
      --border: rgba(255,255,255,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(70% 50% at 50% 0%, #140000 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: linear-gradient(180deg, #0e0000, var(--card));
      border: 1px solid var(--border);
      border-radius: 22px;
      max-width: 520px;
      width: 100%;
      padding: 36px 34px 32px;
      text-align: center;
      box-shadow: 0 30px 70px rgba(0,0,0,0.85);
      animation: fadeUp .6s ease-out;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .avatar img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--red);
      box-shadow: 0 0 45px rgba(225,6,0,0.45);
    }

    h1 {
      font-size: 32px;
      letter-spacing: 0.5px;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .meta span {
      font-size: 14px;
      color: var(--muted);
    }

    .highlight {
      color: #ffffff;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(225,6,0,0.45), transparent);
      margin: 24px 0;
    }

    .focus {
      font-size: 15px;
      line-height: 1.7;
      color: #d6d6d6;
      max-width: 420px;
      margin: 0 auto;
    }

    .links {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    .github {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      transition: transform .2s ease, box-shadow .2s ease, border .2s ease;
      animation: pulse 3.5s ease-in-out infinite;
    }

    .github:hover {
      transform: translateY(-3px);
      border-color: var(--red);
      box-shadow: 0 14px 30px rgba(225,6,0,0.4);
    }

    .icon {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
    }

    footer {
      margin-top: 26px;
      font-size: 12px;
      color: #7a7a7a;
    }
    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 28px 22px 26px;
        border-radius: 18px;
      }

      .avatar img {
        width: 110px;
        height: 110px;
      }

      h1 {
        font-size: 26px;
      }

      .meta span {
        font-size: 13px;
        line-height: 1.5;
      }

      .focus {
        font-size: 14px;
        line-height: 1.65;
      }

      .github {
        width: 46px;
        height: 46px;
      }

      footer {
        font-size: 11px;
      }
    }

  
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(225,6,0,0); }
      50% { box-shadow: 0 0 18px rgba(225,6,0,0.25); }
    }

  </style>
</head>
<body>

  <div class="card">

    <header>
      <div class="avatar">
        <img src="https://github.com/umttur.png" alt="Umut Tur profile photo" />
      </div>
      <h1>Umut Tur</h1>
      <div class="meta">
        <span><span class="highlight">Software Student</span> based in <span class="highlight">Istanbul, Turkey</span></span>
      </div>
    </header>

    <div class="divider"></div>

    <div class="focus">
      You can explore my <span class="highlight">C++</span> and <span class="highlight">Java</span> projects on my GitHub profile,
      where I focus on clean code, problem-solving, and real-world projects.
    </div>

    <div class="links">
      <a class="github" href="https://github.com/umttur" target="_blank" rel="noopener" aria-label="GitHub">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
        </svg>
      </a>
    </div>

    <footer>© 2025 Umut Tur</footer>

  </div>

</body>
</html>
